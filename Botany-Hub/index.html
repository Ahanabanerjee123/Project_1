<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botany Hub - Complete Plant Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
    <body>
    <div class="container">
        <header>
            <h1>🌱 Botany Hub</h1>
            <p class="subtitle">Your Complete Guide to Medicinal, Culinary & Dangerous Plants</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search plants by name, use, or category...">
        </div>

        <div class="plants-grid" id="plantsGrid">
            <!-- Plants will be populated by JavaScript -->
        </div>
    </div>
    <!-- 🔥 MODAL -->
    <div id="plantModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalDetails"></div>
        </div>
    </div>
    <script src="script.js"></script>
    </body>
</html>
